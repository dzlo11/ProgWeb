<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      
      .animal-box {
        display: block;
        margin: 10px;
        float: left;
        position: relative; /* Pour le positionnement des titres */
      }
      
      .animal-box div {
        color: white; 
        background-color: black; 
        text-align: center; 
        padding: 5px;
        position: relative;
        top: -5px; /* Mord sur l'image de 5 pixels */
      }
      
      
      .animal-box img {
        border: 3px solid #aaaaaa;
        width: 180px;
        display: block; /* Évite les espaces blancs sous l'image */
      }
      
      .animal-box img:hover {
        opacity: 0.5;
      }
      
      .end {
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="animal-box">
      <img src="animal1.jpg">
      <div>Animal 1</div>
    </div>
    <div class="animal-box">
      <img src="animal2.jpg">
      <div>Animal 2</div>
    </div>
    <div class="animal-box">
      <img src="animal3.jpg">
      <div>Animal 3</div>
    </div>
    <div class="animal-box">
      <img src="animal4.jpg">
      <div>Animal 4</div>
    </div>
    <div class="animal-box">
      <img src="animal5.jpg">
      <div>Animal 5</div>
    </div>
    <div class="animal-box">
      <img src="animal6.jpg">
      <div>Animal 6</div>
    </div>
    <div class="end">
      Texte à mettre après.
    </div>
  </body>
</html>
