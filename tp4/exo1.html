<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Affichage de formes en Javascript (en console)</title>
    <script src="https://vincentjuge1987.github.io/td/src/td04/no-console.js" type="text/javascript"></script>
    <script>
      "use strict";
        /* Question 1  sans repeat*/
        const triangleRectangle = function(n) {
          let ligne = ""
          for (let i = 1; i <= n; i++ ) {
            ligne = ligne + "."
            console.log(ligne)
            }
        };
        // Écrire les tests ici.
        triangleRectangle(4);

        /* Question 2 */
        const triangleIsocèle = function(n) {
          let ligne = ""
          for (let i = 1; i <= n; i++ ) {
            ligne = ligne + " ".repeat(n-i) + ".".repeat(2*i-1) + "\n"
          }
          console.log(ligne)
        };

        // Écrire les tests ici.
        triangleIsocèle(4);

        /* Question 3 */
        const rectangle = function(a, b) { 
          for (let i = 1; i <= a; i++) { 
            if (i === 1 || i === a) { 
              // Haut et Bas : +------+
              console.log("+" + "-".repeat(b) + "+");
            } 
            else { 
              // Milieu : |      |
              console.log("|" + " ".repeat(b) + "|");
            } 
          }
        };
        // Écrire les tests ici.
        rectangle(4,6);

        /* Question 4 */
        const carré = function(n) {
          // Écrire le corps de la fonction ici.
          rectangle(n,n);
        };
        // Écrire les tests ici.
        carré(4);

        /* Question 6 */
        noMoreConsole(); // Ne **surtout** pas effacer cette ligne
        const rectangle2 = function(a, b) {
          for (let i = 1; i <= a; i++) {
            // CAS 1 : C'est la première OU la dernière ligne
            if (i === 1 || i === a) {
              print("+"); // Le coin gauche
              
              for (let j = 1; j <= b; j++) {
                print("-");
              }
              
              print("+"); // Le coin droit
              newLine();  
            } 
            
            // CAS 2 : Ce sont les lignes du milieu
            else {
              print("|"); // Le bord gauche
              
              for (let j = 1; j <= b; j++) {
                print(" ");
              }
              
              print("|"); // Le bord droit
              newLine();  
            }
          }
        };

        // Écrire les tests ici.
        rectangle2(4,6);
        
    </script>
  </head>
  <body>
    <h2>Affichage de formes en Javascript (en console)</h2>
  </body>
</html>
